<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Astra</title>
  <meta name="description" content="Create your Astra account and start managing team tasks.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .signup-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080810;
      position: relative;
      overflow: hidden;
    }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; }
    .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #f97316, #ea580c); top: -150px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #7c3aed, #4f46e5); bottom: -100px; left: -100px; }
    .grid-overlay {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(249,115,22,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(249,115,22,0.025) 1px, transparent 1px);
      background-size: 50px 50px; pointer-events: none;
    }
    .signup-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 500px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 44px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin: 24px;
    }
    .astra-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo-wordmark { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff 60%, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .form-heading { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; letter-spacing: -0.3px; }
    .form-subheading { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; pointer-events: none; }
    .input-wrap input, .input-wrap select { padding-left: 40px !important; }
    .signup-btn { width: 100%; justify-content: center; padding: 13px; font-size: 15px; font-weight: 700; border-radius: 10px; margin-top: 6px; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #475569; }
    .login-footer a { color: #f97316; font-weight: 600; }
  </style>
</head>
<body>
<div class="signup-shell">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="grid-overlay"></div>

  <div class="signup-card">
    <div class="astra-logo">
      <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="lg2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb923c"/>
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="14" fill="url(#lg2)"/>
        <rect width="48" height="48" rx="14" fill="rgba(0,0,0,0.1)"/>
        <path d="M24 10 L36 36 H30 L24 22 L18 36 H12 L24 10Z" fill="white" opacity="0.95"/>
        <path d="M19 28 H29" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="24" cy="24" r="20" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4 4"/>
      </svg>
      <span class="logo-wordmark">Astra</span>
    </div>

    <div class="form-heading">Create your account</div>
    <div class="form-subheading">Join your team on Astra — free forever.</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div style="margin-bottom:16px;">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.signup') }}" data-validate>
      <div class="two-col">
        <div class="form-group">
          <label for="name">Full name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="name" name="name" placeholder="Alex Johnson" required 
                   pattern="[A-Za-z\s]+" title="Name must contain only characters (no digits)."
                   value="{{ form_data.get('name', '') }}">
          </div>
        </div>
        <div class="form-group">
          <label for="role">Role</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </span>
            <select id="role" name="role">
              <option value="Member" {% if form_data.get('role') != 'Admin' %}selected{% endif %}>Member</option>
              <option value="Admin"  {% if form_data.get('role') == 'Admin' %}selected{% endif %}>Admin</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input type="email" id="email" name="email" placeholder="you@gmail.com" required 
                 pattern=".*@gmail.*" title="Please enter a valid Gmail address."
                 value="{{ form_data.get('email', '') }}">
        </div>
      </div>

      <div class="two-col">
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="Min 6 chars" required>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat" required>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary signup-btn">
        Create Account
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>

    <div class="login-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
